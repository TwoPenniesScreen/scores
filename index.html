<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TTP Scores</title>

  <style>
    /* --- Font --- */
    @font-face{
      font-family: "Twopenniesplain";
      src: url("./assets/Twopenniesplain-Regular.ttf") format("truetype");
      font-display: swap;
    }

    :root{
      /* tweak these without touching JS */
      --dot-size: 12px;
      --dot-inset: 6px; /* “far into the corner” */
      --debug-bg: rgba(0,0,0,0.55);
      --debug-fg: #fff;
    }

    html, body{
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: "Twopenniesplain", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* --- Background states (assets are LOWERCASE in your repo) --- */
    body.bg-generic{
      background: url("./assets/generic.png") center/cover no-repeat fixed;
    }
    body.bg-live{
      background: url("./assets/live.png") center/cover no-repeat fixed;
    }

    /* --- Status dot (top-left, tucked in) --- */
    #statusDot{
      position: fixed;
      top: var(--dot-inset);
      left: var(--dot-inset);
      width: var(--dot-size);
      height: var(--dot-size);
      border-radius: 50%;
      background: transparent; /* no black flash */
      z-index: 9999;
      pointer-events: none;
    }

    /* --- Debug panel (only shown when debug=1) --- */
    #debugPanel{
      position: fixed;
      top: 6px;
      right: 6px;
      z-index: 9999;
      background: var(--debug-bg);
      color: var(--debug-fg);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.25;
      min-width: 260px;
      display: none;
      pointer-events: none;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    #debugPanel .row{
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 2px 0;
      white-space: nowrap;
    }
    #debugPanel .k{ opacity: 0.85; }
    #debugPanel .v{ font-variant-numeric: tabular-nums; }

    /* --- Minimal layout shell (doesn't fight your background artwork) --- */
    #root{
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #board{
      width: 92vw;
      max-width: 1700px;
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    /* Keep text safe: no overflow */
    .line{
      display: grid;
      grid-template-columns: 1.2fr 0.6fr 0.25fr 0.6fr 1.2fr;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(0,0,0,0.40);
      color: #fff;
      font-size: 28px;
      letter-spacing: 0.2px;
    }
    .cell{
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .center{ text-align: center; }
    .right{ text-align: right; }

    .meta{
      font-size: 18px;
      opacity: 0.9;
    }

    /* Welcome / loading */
    #message{
      text-align: center;
      color: #fff;
      font-size: 44px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    #submessage{
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 22px;
      margin-top: 8px;
    }
  </style>
</head>

<body class="bg-generic">
  <div id="statusDot" aria-hidden="true"></div>

  <div id="debugPanel" aria-hidden="true">
    <div class="row"><div class="k">Mode</div><div class="v" id="dbgMode">—</div></div>
    <div class="row"><div class="k">Last poll</div><div class="v" id="dbgLastPoll">—</div></div>
    <div class="row"><div class="k">Next poll in</div><div class="v" id="dbgNextPoll">—</div></div>
    <div class="row"><div class="k">Polling every</div><div class="v" id="dbgEvery">—</div></div>
    <div class="row"><div class="k">Rows</div><div class="v" id="dbgRows">—</div></div>
    <div class="row"><div class="k">Comps</div><div class="v" id="dbgComps">—</div></div>
  </div>

  <div id="root">
    <div id="board">
      <div id="message">WELCOME</div>
      <div id="submessage" class="meta">Loading live scores…</div>
      <div id="list" style="display:none;"></div>
    </div>
  </div>

  <script>
    // ---------- URL params ----------
    const params = new URLSearchParams(location.search);

    const COMPS = (params.get("comps") || "PL").split(",").map(s => s.trim()).filter(Boolean);
    const MAX_VISIBLE = clampInt(params.get("max"), 5, 1, 10);
    const PRE_MIN = clampInt(params.get("pre"), 15, 0, 240);
    const POST_MIN = clampInt(params.get("post"), 15, 0, 240);

    // Pinning: keep nufcId for backwards compatibility, plus optional pinIds=1,2,3
    const NUFC_ID = clampInt(params.get("nufcId"), 67, 0, 999999);
    const PIN_IDS = parseIdList(params.get("pinIds")); // optional, comma-separated

    const DEBUG = params.get("debug") === "1";

    // ---------- UI refs ----------
    const statusDot = document.getElementById("statusDot");
    const debugPanel = document.getElementById("debugPanel");

    const dbgMode = document.getElementById("dbgMode");
    const dbgLastPoll = document.getElementById("dbgLastPoll");
    const dbgNextPoll = document.getElementById("dbgNextPoll");
    const dbgEvery = document.getElementById("dbgEvery");
    const dbgRows = document.getElementById("dbgRows");
    const dbgComps = document.getElementById("dbgComps");

    const messageEl = document.getElementById("message");
    const submessageEl = document.getElementById("submessage");
    const listEl = document.getElementById("list");

    if (DEBUG) {
      debugPanel.style.display = "block";
      dbgRows.textContent = String(MAX_VISIBLE);
      dbgComps.textContent = COMPS.join(",");
    }

    // ---------- Polling modes ----------
    const MODE = {
      LIVE: "LIVE",
      WARM: "WARM",
      IDLE: "IDLE"
    };

    // you can tweak these if needed
    const POLL_MS = {
      [MODE.LIVE]: 60_000,
      [MODE.WARM]: 120_000,
      [MODE.IDLE]: 600_000
    };

    let currentMode = MODE.IDLE;
    let lastPollAt = null;
    let nextPollTimer = null;

    // ---------- Helpers ----------
    function clampInt(v, fallback, min, max) {
      const n = Number.parseInt(v ?? "", 10);
      if (!Number.isFinite(n)) return fallback;
      return Math.max(min, Math.min(max, n));
    }

    function parseIdList(v) {
      if (!v) return [];
      return v.split(",")
        .map(x => Number.parseInt(x.trim(), 10))
        .filter(n => Number.isFinite(n) && n > 0);
    }

    function fmtTime(d) {
      if (!d) return "—";
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function fmtCountdown(ms) {
      if (!Number.isFinite(ms) || ms < 0) return "—";
      const s = Math.ceil(ms / 1000);
      const m = Math.floor(s / 60);
      const r = s % 60;
      return m > 0 ? `${m}m ${String(r).padStart(2,"0")}s` : `${r}s`;
    }

    function setDot(state) {
      // state: "good" | "bad" | "stale" | "clear"
      if (state === "clear") {
        statusDot.style.background = "transparent";
      } else if (state === "good") {
        statusDot.style.background = "#18c46c"; // green
      } else if (state === "stale") {
        statusDot.style.background = "#f2b01e"; // amber
      } else {
        statusDot.style.background = "#e53935"; // red
      }
    }

    function setBg(isLive) {
      document.body.classList.toggle("bg-live", !!isLive);
      document.body.classList.toggle("bg-generic", !isLive);
    }

    function setMode(mode) {
      currentMode = mode;
      if (DEBUG) dbgMode.textContent = mode;
    }

    function scheduleNextPoll() {
      if (nextPollTimer) clearTimeout(nextPollTimer);
      const every = POLL_MS[currentMode] ?? POLL_MS[MODE.IDLE];

      if (DEBUG) {
        dbgEvery.textContent = `${Math.round(every/1000)}s`;
        dbgNextPoll.textContent = fmtCountdown(every);
        // live countdown tick
        const started = Date.now();
        const tick = () => {
          const elapsed = Date.now() - started;
          const remaining = every - elapsed;
          dbgNextPoll.textContent = fmtCountdown(remaining);
          if (remaining > 0 && nextPollTimer) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

      nextPollTimer = setTimeout(pollOnce, every);
    }

    // Decide mode based on matches:
    // - LIVE if any match in-play / paused / etc
    // - WARM if any match within PRE/POST window
    // - else IDLE
    function decideMode(matches) {
      const now = Date.now();
      let inPlay = false;
      let warm = false;

      for (const m of matches) {
        const status = String(m.status || "").toUpperCase();
        if (status === "IN_PLAY" || status === "PAUSED" || status === "LIVE") {
          inPlay = true; break;
        }
        const t = Date.parse(m.utcDate || m.kickoff || m.date || "");
        if (Number.isFinite(t)) {
          const diffMin = (t - now) / 60000;
          if (diffMin <= PRE_MIN && diffMin >= -POST_MIN) warm = true;
        }
      }

      if (inPlay) return MODE.LIVE;
      if (warm) return MODE.WARM;
      return MODE.IDLE;
    }

    // ---------- Fetch with timeout ----------
    async function fetchJSON(url, timeoutMs = 6000) {
      const controller = new AbortController();
      const t = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { signal: controller.signal, cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally {
        clearTimeout(t);
      }
    }

    function buildScoresUrl() {
      const q = new URLSearchParams();
      q.set("comps", COMPS.join(","));
      q.set("pre", String(PRE_MIN));
      q.set("post", String(POST_MIN));
      // pass through max only for your own reference; function may ignore it (UI uses MAX_VISIBLE anyway)
      q.set("max", String(MAX_VISIBLE));
      // If your function supports pinning, pass it; if not, harmless.
      q.set("nufcId", String(NUFC_ID));
      if (PIN_IDS.length) q.set("pinIds", PIN_IDS.join(","));
      return `/.netlify/functions/scores?${q.toString()}`;
    }

    // ---------- Match formatting ----------
    function teamName(t) {
      if (!t) return "";
      if (typeof t === "string") return t;
      return t.shortName || t.name || "";
    }

    function teamId(t) {
      if (!t) return null;
      if (typeof t === "number") return t;
      return t.id ?? null;
    }

    function scoreStr(m) {
      const s = m.score || {};
      const ft = s.fullTime || s.ft || {};
      const hs = (ft.home ?? ft.homeTeam ?? ft.homeScore);
      const as = (ft.away ?? ft.awayTeam ?? ft.awayScore);
      if (Number.isFinite(hs) && Number.isFinite(as)) return `${hs} - ${as}`;

      // Some APIs put score directly
      if (Number.isFinite(m.homeScore) && Number.isFinite(m.awayScore)) return `${m.homeScore} - ${m.awayScore}`;

      return "—";
    }

    function statusStr(m) {
      const st = String(m.status || "").toUpperCase();
      if (!st) return "";
      if (st === "FINISHED" || st === "FT") return "FT";
      if (st === "SCHEDULED") return "KO";
      if (st === "TIMED") return "KO";
      if (st === "IN_PLAY" || st === "LIVE") return "LIVE";
      if (st === "PAUSED") return "HT";
      return st;
    }

    function kickoffStr(m) {
      const t = Date.parse(m.utcDate || m.kickoff || m.date || "");
      if (!Number.isFinite(t)) return "";
      const d = new Date(t);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    function isPinnedMatch(m) {
      const hId = teamId(m.homeTeam);
      const aId = teamId(m.awayTeam);

      const pinSet = new Set([NUFC_ID, ...PIN_IDS].filter(Boolean));
      return (hId && pinSet.has(hId)) || (aId && pinSet.has(aId));
    }

    // ---------- Render ----------
    function render(matches) {
      const list = Array.isArray(matches) ? matches.slice() : [];

      // Pin one match to the top (NUFC or pinIds), keep the rest in order
      const pinned = list.find(isPinnedMatch);
      const rest = pinned ? list.filter(m => m !== pinned) : list;

      const visibleSlots = pinned ? (MAX_VISIBLE - 1) : MAX_VISIBLE;
      const visible = pinned ? [pinned, ...rest.slice(0, Math.max(0, visibleSlots))] : rest.slice(0, MAX_VISIBLE);

      // Background live if any live
      const anyLive = visible.some(m => {
        const st = String(m.status || "").toUpperCase();
        return st === "IN_PLAY" || st === "PAUSED" || st === "LIVE";
      });
      setBg(anyLive);

      // UI swap
      messageEl.style.display = "none";
      submessageEl.style.display = "none";
      listEl.style.display = "block";
      listEl.innerHTML = "";

      for (const m of visible) {
        const line = document.createElement("div");
        line.className = "line";

        const home = document.createElement("div");
        home.className = "cell right";
        home.textContent = teamName(m.homeTeam) || m.home || "";

        const sc = document.createElement("div");
        sc.className = "cell center";
        sc.textContent = scoreStr(m);

        const st = document.createElement("div");
        st.className = "cell center";
        st.textContent = statusStr(m);

        const ko = document.createElement("div");
        ko.className = "cell center meta";
        ko.textContent = kickoffStr(m);

        const away = document.createElement("div");
        away.className = "cell";
        away.textContent = teamName(m.awayTeam) || m.away || "";

        // grid: home | score | status | ko | away
        line.appendChild(home);
        line.appendChild(sc);
        line.appendChild(st);
        line.appendChild(ko);
        line.appendChild(away);

        listEl.appendChild(line);
      }
    }

    // ---------- Polling ----------
    async function pollOnce() {
      lastPollAt = new Date();
      if (DEBUG) dbgLastPoll.textContent = fmtTime(lastPollAt);

      const url = buildScoresUrl();

      try {
        setDot("clear"); // neutral while fetching (no flash)
        const data = await fetchJSON(url, 6500);

        // Try to extract matches robustly (depends how your function returns)
        const matches =
          Array.isArray(data) ? data :
          (Array.isArray(data.matches) ? data.matches :
          (Array.isArray(data.data) ? data.data :
          (Array.isArray(data.items) ? data.items : [])));

        if (!matches.length) {
          setDot("bad");
          setMode(MODE.IDLE);
          setBg(false);
          messageEl.style.display = "block";
          submessageEl.style.display = "block";
          listEl.style.display = "none";
          messageEl.textContent = "NO MATCHES";
          submessageEl.textContent = "Nothing returned from scores feed";
          scheduleNextPoll();
          return;
        }

        // Determine mode + polling interval
        const mode = decideMode(matches);
        setMode(mode);

        // Render
        render(matches);

        // Status good
        setDot("good");

      } catch (err) {
        // Keep whatever is currently on screen; mark red.
        setDot("bad");

        // If we haven't rendered anything yet, show a friendly screen
        if (listEl.style.display === "none") {
          messageEl.style.display = "block";
          submessageEl.style.display = "block";
          listEl.style.display = "none";
          messageEl.textContent = "WELCOME";
          submessageEl.textContent = "Scores temporarily unavailable";
        }

      } finally {
        scheduleNextPoll();
      }
    }

    // Start: show clean welcome (no fake sample data), then poll immediately
    setMode(MODE.IDLE);
    setDot("clear");
    pollOnce();
  </script>
</body>
</html>
