<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>The Two Pennies — Live Scores (Static Prototype)</title>

  <style>
    @font-face{
      font-family:"TwoPenniesPlain";
      src:url("./assets/Twopenniesplain-Regular.ttf") format("truetype");
      font-display:swap;
    }

    :root{
      --fg: #f3f3f3;
      --muted: rgba(243,243,243,.78);
      --card: rgba(0,0,0,.55);
      --stroke: rgba(255,255,255,.12);
      --rowbg: rgba(0,0,0,.28);
      --rowstroke: rgba(255,255,255,.10);
      --card-max-h: 56vh;
    }

    *{ box-sizing:border-box; }
    html,body{ width:100%; height:100%; margin:0; overflow:hidden; background:#0b0b0b; }
    body{
      font-family: TwoPenniesPlain, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg);
    }

    .bg{
      position:fixed; inset:0;
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
      z-index:0;
    }
    body[data-mode="welcome"] .bg{ background-image:url('./assets/Generic.png'); }
    body[data-mode="live"] .bg{ background-image:url('./assets/Live.png'); }

    .content{
      position:relative;
      z-index: 20;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 60px 80px;
    }

    body[data-mode="welcome"] .scoresCard{ display:none; }
    body[data-mode="live"] .scoresCard{ display:block; }

    .scoresCard{
      width: min(1500px, 82vw);
      max-height: var(--card-max-h);
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: 0 16px 40px rgba(0,0,0,.38);
      padding: 22px 26px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .rows{
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .row{
      border-radius: 18px;
      background: var(--rowbg);
      border: 1px solid var(--rowstroke);
      padding: 12px 16px;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      column-gap: 18px;
      align-items:baseline;
      position: relative;
      padding-left: 64px;
    }

    .compChip{
      position:absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-62%);
      min-width: 42px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .5px;
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
      pointer-events:none;
    }

    .scrollViewport{
      overflow:hidden;
      width:100%;
      padding-top: 8px;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
      mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
    }
    .scrollInner{
      display:flex;
      flex-direction:column;
      gap: 12px;
      will-change: transform;
      animation: scrollUp var(--scroll-duration, 40s) linear infinite;
    }
    @keyframes scrollUp{
      to{ transform: translateY(calc(-1 * var(--scroll-distance, 0px))); }
    }

    .team{
      font-size: 30px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      align-self: baseline;
    }
    .team.home{ text-align:right; padding-right: 6px; grid-column:1; }
    .team.away{ text-align:left;  padding-left: 6px; grid-column:3; }

    /* Centre axis: FIXED columns so VS never shifts */
    /* Centre axis rebuilt for true baseline alignment */
.scoreLine{
  grid-column:2;
  display:flex;
  flex-direction: column;
  align-items: center;
}

.scoreTop{
  display:grid;
  grid-template-columns: 54px 54px 54px;  /* left score / vs / right score */
  align-items: baseline;
  justify-items: center;
  line-height: 1;
}
.scoreTop .score:first-child{ grid-column:1; }
.scoreTop .vs{ grid-column:2; }
.scoreTop .score:last-child{ grid-column:3; }

.score{
  font-size: 52px;
  font-weight: 700;
  line-height: 0.9;          /* tighten internal box */
  display:inline-block;
  position: relative;
  top: 2px;                  /* optical baseline correction */

  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum' 1;
}

.vs{
  font-size: 24px;
  font-weight: 500;
  opacity: .92;
  line-height: 1;
}

.status{
  .status{
  margin-top: 6px;
  width: 162px;              /* lock it to scoreTop width */
  text-align: center;
  display:flex;
  align-items:center;
  justify-content:center;

  font-size: 20px;
  font-weight: 500;
  color: var(--muted);
}

    /* Stronger, more “anchored” numerals */
    .score{
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      min-width: 24px;
      text-align:center;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    .vs{
      font-size: 24px;
      font-weight: 500;
      opacity: .92;
      text-align:center;
      letter-spacing: .5px;
      grid-column:2;
      grid-row:1;
    }

    .status{
      grid-column:2;
      grid-row:2;
      font-size: 20px;
      font-weight: 500;
      color: var(--muted);
      width: 54px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    .row.nufc{
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.75);
    }

    .debug{
      position:fixed;
      top: 90px;
      left: 24px;
      z-index: 999999;
      display: none;
      gap:10px;
      opacity: 1;
      pointer-events:auto;
      font-size:14px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.22);
    }
    .debug button{
      font-family:inherit;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.10);
      color: #fff;
    }

    #statusDot{
      position: fixed;
      top: 6px;
      left: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: transparent;
      z-index: 1000000;
      pointer-events: none;
    }

    .debugInfo{
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.18);
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: baseline;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }
    .debugInfo .k{ opacity: .85; }
    .debugInfo .v{ text-align:right; }

  </style>
</head>

<body data-mode="welcome">
  <div class="bg" aria-hidden="true"></div>
  <div id="statusDot" aria-hidden="true"></div>

  <div class="debug" data-debug-panel aria-label="Debug controls">
    <button id="btnWelcome" type="button">WELCOME</button>
    <button id="btnLive" type="button">LIVE</button>
    <button id="btnMany" type="button">6 ROWS</button>
    <button id="btnFew" type="button">3 ROWS</button>

    <div id="debugStatus" style="margin-top:6px;color:rgba(255,255,255,.85);font-size:13px;white-space:nowrap;"></div>

    <div class="debugInfo" aria-hidden="true">
      <div class="k">Mode</div><div class="v" id="dbgMode">—</div>
      <div class="k">Last poll</div><div class="v" id="dbgLastPoll">—</div>
      <div class="k">Next poll</div><div class="v" id="dbgNextPoll">—</div>
      <div class="k">Every</div><div class="v" id="dbgEvery">—</div>
      <div class="k">Rows</div><div class="v" id="dbgRows">—</div>
      <div class="k">Comps</div><div class="v" id="dbgComps">—</div>
    </div>
  </div>

  <div class="content">
    <div class="scoresCard" aria-label="Scores card">
      <div class="rows" id="rowsPinned"></div>
      <div class="scrollViewport" id="scrollViewport" style="display:none;"></div>
    </div>
  </div>

  <script>
    // URL overrides (for testing)
    (function(){
      const params = new URLSearchParams(window.location.search);
      const mode = (params.get('mode') || '').toLowerCase();
      if (mode === 'live') document.body.setAttribute('data-mode','live');
      if (mode === 'welcome') document.body.setAttribute('data-mode','welcome');
    })();

    const rowsPinned = document.getElementById('rowsPinned');
    const scrollViewport = document.getElementById('scrollViewport');

    const sample6 = [
      {home:"Newcastle United", hs:1, as:0, away:"Aston Villa", st:"63'", nufc:true, comp:"PL"},
      {home:"Arsenal", hs:2, as:2, away:"Spurs", st:"HT", comp:"PL"},
      {home:"Man City", hs:0, as:0, away:"Chelsea", st:"41'", comp:"PL"},
      {home:"Brighton & Hove Albion", hs:10, as:2, away:"Wolves", st:"FT", comp:"PL"},
      {home:"Everton", hs:0, as:1, away:"Fulham", st:"78'", comp:"PL"},
      {home:"West Ham", hs:1, as:3, away:"Liverpool", st:"90+2'", comp:"PL"}
    ];
    const sample3 = sample6.slice(0,3);

    const MAX_VISIBLE_DEFAULT = 5;

    function rowHTML(r){
      const comp = (r.comp || "").toUpperCase();
      return `
        <div class="row${r.nufc ? " nufc" : ""}">
          <div class="compChip">${comp}</div>
          <div class="team home">${r.home}</div>
          <div class="scoreLine">
  <div class="scoreTop">
    <span class="score">${r.hs}</span>
    <span class="vs">vs</span>
    <span class="score">${r.as}</span>
  </div>
  <div class="status">${r.st}</div>
</div>
          <div class="team away">${r.away}</div>
        </div>
      `;
    }

    function render(list){
      const maxVis = (typeof window.__MAX_VISIBLE === 'number' ? window.__MAX_VISIBLE : MAX_VISIBLE_DEFAULT);
      rowsPinned.innerHTML = "";
      scrollViewport.style.display = "none";
      scrollViewport.innerHTML = "";

      if (list.length <= maxVis){
        rowsPinned.innerHTML = list.map(rowHTML).join("");
        return;
      }

      let pinned = null;
      const rest = [];
      for (const g of list){
        if (!pinned && g.nufc){ pinned = g; }
        else { rest.push(g); }
      }

      const visibleSlots = pinned ? (maxVis - 1) : maxVis;
      if (pinned) rowsPinned.innerHTML = rowHTML(pinned);

      const original = rest.slice();
      const dup = original.concat(original);

      const inner = document.createElement("div");
      inner.className = "scrollInner";
      inner.innerHTML = dup.map(rowHTML).join("");

      scrollViewport.appendChild(inner);
      scrollViewport.style.display = "block";

      requestAnimationFrame(() => {
        const firstRow = inner.querySelector(".row");
        if (!firstRow) return;

        const rowH = firstRow.getBoundingClientRect().height;
        const gap = 12;
        const viewportH = (rowH * visibleSlots) + (gap * (visibleSlots - 1));
        scrollViewport.style.height = `${viewportH}px`;

        const rows = inner.querySelectorAll(".row");
        let dist = 0;
        for (let i=0; i<original.length; i++){
          dist += rows[i].getBoundingClientRect().height;
          if (i < original.length - 1) dist += gap;
        }

        const secondsPerRow = 7;
        const duration = Math.max(20, original.length * secondsPerRow);

        scrollViewport.style.setProperty("--scroll-distance", `${dist}px`);
        inner.style.setProperty("--scroll-distance", `${dist}px`);
        inner.style.setProperty("--scroll-duration", `${duration}s`);
      });
    }

    render(sample6);

    const setMode = (m) => document.body.setAttribute("data-mode", m);
    (() => { const el=document.getElementById("btnWelcome"); if(el) el.onclick = () => setMode("welcome"); })();
    (() => { const el=document.getElementById("btnLive"); if(el) el.onclick = () => setMode("live"); })();
    (() => { const el=document.getElementById("btnMany"); if(el) el.onclick = () => render(sample6); })();
    (() => { const el=document.getElementById("btnFew"); if(el) el.onclick = () => render(sample3); })();

    // --- FOOTBALL-DATA integration (via Netlify Function) ---
    const params = new URLSearchParams(window.location.search);
    const DEBUG = params.get("debug") === "1";
    const forcedMode = (params.get("mode") || "").toLowerCase();
    const MAX_VISIBLE = Math.max(1, Math.min(8, parseInt(params.get("max") || "5", 10)));
    const PRE_MIN = Math.max(0, Math.min(2880, parseInt(params.get("pre") || "15", 10)));
    const POST_MIN = Math.max(0, Math.min(240, parseInt(params.get("post") || "15", 10)));
    const NUFC_ID = parseInt(params.get("nufcId") || "0", 10);

    window.__MAX_VISIBLE = MAX_VISIBLE;

    const statusDot = document.getElementById("statusDot");
    function setDot(state){
      if (!statusDot) return;
      if (state === "clear") statusDot.style.background = "transparent";
      else if (state === "good") statusDot.style.background = "#18c46c";
      else if (state === "warn") statusDot.style.background = "#f2b01e";
      else statusDot.style.background = "#e53935";
    }

    const dbgModeEl = document.getElementById("dbgMode");
    const dbgLastPollEl = document.getElementById("dbgLastPoll");
    const dbgNextPollEl = document.getElementById("dbgNextPoll");
    const dbgEveryEl = document.getElementById("dbgEvery");
    const dbgRowsEl = document.getElementById("dbgRows");
    const dbgCompsEl = document.getElementById("dbgComps");

    if (DEBUG){
      if (dbgRowsEl) dbgRowsEl.textContent = String(MAX_VISIBLE);
      const compsText = (params.get('comps') || 'PL,ELC,CL,WC,EC');
      if (dbgCompsEl) dbgCompsEl.textContent = compsText;
    }

    const COMPS = (params.get("comps") || "PL,ELC,CL,WC,EC")
      .split(",").map(s=>s.trim().toUpperCase()).filter(Boolean);

    const debugStatus = document.getElementById("debugStatus");
    const debugPanel = document.querySelector(".debug");
    if (debugStatus) debugStatus.style.display = DEBUG ? "block" : "none";
    if (debugPanel) debugPanel.style.display = DEBUG ? "flex" : "none";

    function setDebug(text){
      if (!debugStatus) return;
      debugStatus.textContent = text;
    }

    function londonNow(){
      return new Date(new Intl.DateTimeFormat("en-US", { timeZone: "Europe/London", hour12:false,
        year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit"
      }).format(new Date()).replace(/(\d{2})\/(\d{2})\/(\d{4}),\s*/,"$3-$1-$2T").replace(" ", ""));
    }

    function minutesBetween(a, b){
      return (b.getTime() - a.getTime()) / 60000;
    }

    function parseUtc(utcStr){
      const d = new Date(utcStr);
      return isNaN(d.getTime()) ? null : d;
    }

    function statusLabel(match){
      const st = String(match.status || "").toUpperCase();
      if (st === "PAUSED") return "HT";
      if (st === "FINISHED") return "FT";
      if (st === "IN_PLAY" || st === "LIVE") return "LIVE";
      if (st === "SCHEDULED" || st === "TIMED") {
        const d = parseUtc(match.utcDate);
        if (!d) return "KO";
        const fmt = new Intl.DateTimeFormat("en-GB", { timeZone: "Europe/London", hour:"2-digit", minute:"2-digit" });
        return fmt.format(d);
      }
      return st;
    }

    function scoresFor(match){
      const ft = match.score?.fullTime || {home:null,away:null};
      const ht = match.score?.halfTime || {home:null,away:null};
      const hs = (ft.home ?? ht.home ?? null);
      const as = (ft.away ?? ht.away ?? null);
      return { home: (hs === null ? "" : String(hs)), away: (as === null ? "" : String(as)) };
    }

    function isLiveStatus(st){
      const s = String(st || "").trim().toUpperCase();
      return s === "IN_PLAY" || s === "PAUSED" || s === "LIVE";
    }

    function competitionPriority(comp){
      const order = ["PL","ELC","CL","WC","EC"];
      const i = order.indexOf(comp);
      return i === -1 ? 999 : i;
    }

    function pinAndSort(matches){
      const ms = matches.filter(m => !m.__error && m.homeTeam && m.awayTeam);

      const annotated = ms.map(m => {
        const homeId = m.homeTeam.id;
        const awayId = m.awayTeam.id;
        const kick = parseUtc(m.utcDate) || new Date(0);
        const live = isLiveStatus(m.status);
        const isNUFC = (NUFC_ID && (homeId === NUFC_ID || awayId === NUFC_ID));
        const pin = !!(isNUFC && live);
        return { ...m, __isNUFC:isNUFC, __pin:pin, __kick:kick, __live:live };
      });

      annotated.sort((a,b) => {
        if (a.__pin !== b.__pin) return a.__pin ? -1 : 1;
        if (a.__live !== b.__live) return a.__live ? -1 : 1;
        const cp = competitionPriority(a.comp) - competitionPriority(b.comp);
        if (cp !== 0) return cp;
        return a.__kick.getTime() - b.__kick.getTime();
      });

      return annotated;
    }

    function decideMode(matches){
      if (forcedMode === "live" || forcedMode === "welcome") return forcedMode;

      const now = londonNow();
      const sorted = pinAndSort(matches);

      const liveNow = sorted.some(m => isLiveStatus(m.status));

      const warm = sorted.some(m => {
        const st = String(m.status || "").toUpperCase();
        if (st !== "SCHEDULED" && st !== "TIMED") return false;
        const mins = minutesBetween(now, m.__kick);
        return mins >= 0 && mins <= PRE_MIN;
      });

      if (liveNow || warm) return "live";

      const finished = sorted.filter(m => String(m.status || "").toUpperCase() === "FINISHED" && m.__kick.getTime() > 0);
      if (finished.length) {
        const latest = finished.reduce((p,c)=> (c.__kick > p.__kick ? c : p));
        const estEnd = new Date(latest.__kick.getTime() + 105*60000);
        const minsAfter = minutesBetween(estEnd, now);
        if (minsAfter >= 0 && minsAfter <= POST_MIN) return "live";
      }

      return "welcome";
    }

    async function fetchMatches(){
      const url = `/.netlify/functions/scores?comps=${encodeURIComponent(COMPS.join(","))}`;
      const res = await fetch(url, { cache:"no-store" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Unknown API error");
      return data.matches || [];
    }

    function toRowItem(m){
      const sc = scoresFor(m);
      const st = statusLabel(m);
      return {
        home: m.homeTeam.name || "",
        away: m.awayTeam.name || "",
        hs: sc.home,
        as: sc.away,
        st,
        nufc: m.__isNUFC,
        comp: m.comp,
      };
    }

    async function tick(){
      try{
        const pollStartedAt = londonNow();
        setDot('warn');
        setDebug(`Fetching… (${COMPS.join(",")})`);

        if (DEBUG && dbgLastPollEl){
          dbgLastPollEl.textContent = new Intl.DateTimeFormat('en-GB',{timeZone:'Europe/London',hour:'2-digit',minute:'2-digit',second:'2-digit'}).format(pollStartedAt);
        }

        const matches = await fetchMatches();
        const sorted = pinAndSort(matches);
        const mode = decideMode(sorted);

        document.body.setAttribute("data-mode", mode);
        if (DEBUG && dbgModeEl) dbgModeEl.textContent = mode.toUpperCase();

        const now = londonNow();
        let display = sorted.filter(m => {
          const st = String(m.status || "").toUpperCase();
          if (isLiveStatus(st)) return true;
          if (st === "SCHEDULED" || st === "TIMED"){
            const mins = minutesBetween(now, m.__kick);
            return mins >= 0 && mins <= PRE_MIN;
          }
          if (st === "FINISHED"){
            const estEnd = new Date(m.__kick.getTime() + 105*60000);
            const minsAfter = minutesBetween(estEnd, now);
            return minsAfter >= 0 && minsAfter <= POST_MIN;
          }
          return false;
        });

        if (mode === "live" && display.length === 0){
          display = sorted.filter(m => {
            const st = String(m.status || "").toUpperCase();
            return st === "SCHEDULED" || st === "TIMED";
          }).slice(0, MAX_VISIBLE);
        }

        const rows = display.map(toRowItem);
        if (typeof render === "function") render(rows);

        const nextPoll = (() => {
          const live = display.some(m => isLiveStatus(m.status));
          if (mode === "live" && live) return 60_000;
          if (mode === "live") return 120_000;
          return 600_000;
        })();

        setDot('good');
        if (DEBUG){
          if (dbgEveryEl) dbgEveryEl.textContent = `${((nextPoll/1000)|0)}s`;
          if (dbgNextPollEl) dbgNextPollEl.textContent = `${((nextPoll/1000)|0)}s`;
        }

        setDebug(`Mode=${mode.toUpperCase()} | rows=${rows.length} | next poll ${(nextPoll/1000)|0}s`);
        setTimeout(tick, nextPoll);
      }catch(e){
        setDot('bad');
        if (DEBUG && dbgModeEl) dbgModeEl.textContent = 'ERROR';
        setDebug(`ERROR: ${e.message || e}`);

        if (DEBUG){
          if (dbgEveryEl) dbgEveryEl.textContent = '120s';
          if (dbgNextPollEl) dbgNextPollEl.textContent = '120s';
        }
        setTimeout(tick, 120_000);
      }
    }

    setDot('clear');
    setTimeout(tick, 500);
  </script>
</body>
</html>
