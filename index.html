<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>TTP Scores — Live Deploy Monitoring</title>

  <style>
    @font-face{
      font-family:"TwoPenniesPlain";
      src:url("./assets/Twopenniesplain-Regular.ttf") format("truetype");
      font-display:swap;
    }

    :root{
      --fg: #f3f3f3;
      --muted: rgba(243,243,243,.78);
      --card: rgba(0,0,0,.55);
      --stroke: rgba(255,255,255,.12);
      --rowbg: rgba(0,0,0,.28);
      --rowstroke: rgba(255,255,255,.10);
      --card-max-h: 56vh;
    }

    *{ box-sizing:border-box; }
    html,body{ width:100%; height:100%; margin:0; overflow:hidden; background:#0b0b0b; }
    body{
      font-family: TwoPenniesPlain, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg);
    }

    .bg{
      position:fixed; inset:0;
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
      z-index:0;
    }
    body[data-mode="welcome"] .bg{ background-image:url('./assets/Generic.png'); }
    body[data-mode="live"] .bg{ background-image:url('./assets/Live.png'); }

    .content{
      position:relative;
      z-index: 20;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 60px 80px;
    }

    body[data-mode="welcome"] .scoresCard{ display:none; }
    body[data-mode="live"] .scoresCard{ display:block; }

    .scoresCard{
      width: min(1500px, 82vw);
      max-height: var(--card-max-h);
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: 0 16px 40px rgba(0,0,0,.38);
      padding: 22px 26px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .rows{
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .row{
      border-radius: 18px;
      background: var(--rowbg);
      border: 1px solid var(--rowstroke);
      padding: 12px 16px;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      column-gap: 18px;
      align-items:baseline;
      position: relative;
      padding-left: 64px;
    }

    .compChip{
      position:absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-62%);
      min-width: 42px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .5px;
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
      pointer-events:none;
    }

    /* Scroll viewport (only used when >max rows) */
    .scrollViewport{
      overflow:hidden;
      width:100%;
      padding-top: 8px;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
      mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
    }
    .scrollInner{
      display:flex;
      flex-direction:column;
      gap: 12px;
      will-change: transform;
      animation: scrollUp var(--scroll-duration, 40s) linear infinite;
    }
    @keyframes scrollUp{
      to{ transform: translateY(calc(-1 * var(--scroll-distance, 0px))); }
    }

    .team{
      font-size: 30px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      align-self: baseline;
    }
    .team.home{ text-align:right; padding-right: 6px; grid-column:1; }
    .team.away{ text-align:left;  padding-left: 6px; grid-column:3; }

    /* Centre axis rebuilt for true baseline alignment */
    .scoreLine{ grid-column:2; display:flex; flex-direction:column; align-items:center; }
    .scoreTop{
      display:grid;
      grid-template-columns: 54px 54px 54px;
      align-items: baseline;
      justify-items: center;
      line-height: 1;
    }
    .score{
      font-size: 52px;
      font-weight: 700;
      line-height: 0.9;
      display:inline-block;
      position: relative;
      top: 2px;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }
    .vs{
      font-size: 24px;
      font-weight: 500;
      opacity: .92;
      line-height: 1;
    }
    .status{
      margin-top: 6px;
      width: 162px;
      text-align: center;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 20px;
      font-weight: 500;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    .row.nufc{
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.75);
    }

    /* Debug panel */
    .debug{
      position:fixed;
      top: 90px;
      left: 24px;
      z-index: 999999;
      display:none;
      gap:10px;
      opacity: 1;
      pointer-events:auto;
      font-size:14px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.22);
      flex-wrap: wrap;
      max-width: 520px;
    }
    .debug button{
      font-family:inherit;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.10);
      color: #fff;
      cursor:pointer;
    }
    .debugInfo{
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.18);
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: baseline;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }
    .debugInfo .k{ opacity: .85; }
    .debugInfo .v{ text-align:right; }

    /* Status dot (top-left) */
    #statusDot{
      position: fixed;
      top: 6px;
      left: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: transparent;
      z-index: 1000000;
      pointer-events: none;
    }
  </style>
</head>

<body data-mode="welcome">
  <div class="bg" aria-hidden="true"></div>
  <div id="statusDot" aria-hidden="true"></div>

  <div class="debug" id="debugPanel" aria-label="Debug controls">
    <button id="btnWelcome" type="button">WELCOME</button>
    <button id="btnLive" type="button">LIVE</button>
    <button id="btnMany" type="button">6 ROWS</button>
    <button id="btnFew" type="button">3 ROWS</button>

    <div id="debugStatus" style="margin-top:6px;color:rgba(255,255,255,.85);font-size:13px;white-space:nowrap;flex-basis:100%;"></div>

    <div class="debugInfo" aria-hidden="true">
      <div class="k">Mode</div><div class="v" id="dbgMode">—</div>
      <div class="k">Last poll</div><div class="v" id="dbgLastPoll">—</div>
      <div class="k">Next poll</div><div class="v" id="dbgNextPoll">—</div>
      <div class="k">Every</div><div class="v" id="dbgEvery">—</div>
      <div class="k">Rows</div><div class="v" id="dbgRows">—</div>
      <div class="k">Comps</div><div class="v" id="dbgComps">—</div>
      <div class="k">Seen</div><div class="v" id="dbgSeen">—</div>
    </div>
  </div>

  <div class="content">
    <div class="scoresCard" aria-label="Scores card">
      <div class="rows" id="rowsPinned"></div>
      <div class="scrollViewport" id="scrollViewport" style="display:none;"></div>
    </div>
  </div>

  <script>
    const rowsPinned = document.getElementById('rowsPinned');
    const scrollViewport = document.getElementById('scrollViewport');

    // Sample rows for debug buttons
    const sample6 = [
      {home:"Newcastle United", hs:"1", as:"0", away:"Aston Villa", st:"LIVE", nufc:true, comp:"PL"},
      {home:"Arsenal", hs:"2", as:"2", away:"Spurs", st:"HT", comp:"PL"},
      {home:"Man City", hs:"0", as:"0", away:"Chelsea", st:"LIVE", comp:"PL"},
      {home:"Brighton", hs:"10", as:"2", away:"Wolves", st:"FT", comp:"PL"},
      {home:"Everton", hs:"0", as:"1", away:"Fulham", st:"LIVE", comp:"PL"},
      {home:"West Ham", hs:"1", as:"3", away:"Liverpool", st:"FT", comp:"PL"}
    ];
    const sample3 = sample6.slice(0,3);

    const MAX_VISIBLE_DEFAULT = 5;

    function rowHTML(r){
      const comp = (r.comp || "").toUpperCase();
      return `
        <div class="row${r.nufc ? " nufc" : ""}">
          <div class="compChip">${comp}</div>
          <div class="team home">${r.home}</div>
          <div class="scoreLine">
            <div class="scoreTop">
              <span class="score">${r.hs ?? ""}</span>
              <span class="vs">vs</span>
              <span class="score">${r.as ?? ""}</span>
            </div>
            <div class="status">${r.st ?? ""}</div>
          </div>
          <div class="team away">${r.away}</div>
        </div>
      `;
    }

    function render(list){
      const maxVis = (typeof window.__MAX_VISIBLE === 'number' ? window.__MAX_VISIBLE : MAX_VISIBLE_DEFAULT);

      rowsPinned.innerHTML = "";
      scrollViewport.style.display = "none";
      scrollViewport.innerHTML = "";

      if (list.length <= maxVis){
        rowsPinned.innerHTML = list.map(rowHTML).join("");
        return;
      }

      // Pin NUFC row if present
      let pinned = null;
      const rest = [];
      for (const g of list){
        if (!pinned && g.nufc) pinned = g;
        else rest.push(g);
      }

      const visibleSlots = pinned ? (maxVis - 1) : maxVis;
      if (pinned) rowsPinned.innerHTML = rowHTML(pinned);

      const original = rest.slice();
      const dup = original.concat(original);

      const inner = document.createElement("div");
      inner.className = "scrollInner";
      inner.innerHTML = dup.map(rowHTML).join("");
      scrollViewport.appendChild(inner);
      scrollViewport.style.display = "block";

      requestAnimationFrame(() => {
        const firstRow = inner.querySelector(".row");
        if (!firstRow) return;

        const rowH = firstRow.getBoundingClientRect().height;
        const gap = 12;
        const viewportH = (rowH * visibleSlots) + (gap * (visibleSlots - 1));
        scrollViewport.style.height = `${viewportH}px`;

        const rows = inner.querySelectorAll(".row");
        let dist = 0;
        for (let i=0; i<original.length; i++){
          dist += rows[i].getBoundingClientRect().height;
          if (i < original.length - 1) dist += gap;
        }

        const secondsPerRow = 7;
        const duration = Math.max(20, original.length * secondsPerRow);
        inner.style.setProperty("--scroll-distance", `${dist}px`);
        inner.style.setProperty("--scroll-duration", `${duration}s`);
      });
    }

    // Debug buttons (always wired; panel only shows when debug=1)
    const setMode = (m) => document.body.setAttribute("data-mode", m);
    document.getElementById("btnWelcome").onclick = () => setMode("welcome");
    document.getElementById("btnLive").onclick = () => setMode("live");
    document.getElementById("btnMany").onclick = () => { setMode("live"); render(sample6); };
    document.getElementById("btnFew").onclick = () => { setMode("live"); render(sample3); };

    // --- Live integration ---
    const params = new URLSearchParams(window.location.search);
    const DEBUG = params.get("debug") === "1";
    const forcedMode = (params.get("mode") || "").toLowerCase(); // live|welcome|""
    const MAX_VISIBLE = clampInt(params.get("max"), 5, 1, 8);
    const PRE_MIN = clampInt(params.get("pre"), 15, 0, 2880);
    const POST_MIN = clampInt(params.get("post"), 15, 0, 240);
    const NUFC_ID = clampInt(params.get("nufcId"), 67, 0, 999999);
    const COMPS = (params.get("comps") || "PL,ELC,CL,WC,EC").split(",").map(s=>s.trim().toUpperCase()).filter(Boolean);

    window.__MAX_VISIBLE = MAX_VISIBLE;

    const debugPanel = document.getElementById("debugPanel");
    const debugStatus = document.getElementById("debugStatus");
    debugPanel.style.display = DEBUG ? "flex" : "none";
    debugStatus.style.display = DEBUG ? "block" : "none";

    const dbgModeEl = document.getElementById("dbgMode");
    const dbgLastPollEl = document.getElementById("dbgLastPoll");
    const dbgNextPollEl = document.getElementById("dbgNextPoll");
    const dbgEveryEl = document.getElementById("dbgEvery");
    const dbgRowsEl = document.getElementById("dbgRows");
    const dbgCompsEl = document.getElementById("dbgComps");
    const dbgSeenEl = document.getElementById("dbgSeen");

    if (DEBUG){
      if (dbgRowsEl) dbgRowsEl.textContent = String(MAX_VISIBLE);
      if (dbgCompsEl) dbgCompsEl.textContent = COMPS.join(",");
    }

    const statusDot = document.getElementById("statusDot");
    function setDot(state){
      if (!statusDot) return;
      if (state === "clear") statusDot.style.background = "transparent";
      else if (state === "good") statusDot.style.background = "#18c46c";
      else if (state === "warn") statusDot.style.background = "#f2b01e";
      else statusDot.style.background = "#e53935";
    }
    function setDebug(text){ if (DEBUG && debugStatus) debugStatus.textContent = text; }

    function clampInt(v, fallback, min, max){
      const n = parseInt(v || "", 10);
      if (!Number.isFinite(n)) return fallback;
      return Math.max(min, Math.min(max, n));
    }

    function nowLondon(){
      // Stable "now" in Europe/London for comparisons
      const parts = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Europe/London",
        year:"numeric", month:"2-digit", day:"2-digit",
        hour:"2-digit", minute:"2-digit", second:"2-digit",
        hourCycle:"h23"
      }).formatToParts(new Date());
      const get = (t)=> parts.find(p=>p.type===t)?.value || "00";
      return new Date(`${get("year")}-${get("month")}-${get("day")}T${get("hour")}:${get("minute")}:${get("second")}`);
    }

    function parseUtc(utcStr){
      const d = new Date(utcStr);
      return Number.isFinite(d.getTime()) ? d : null;
    }

    function minutesBetween(a, b){ return (b.getTime() - a.getTime()) / 60000; }

    function isLiveStatus(st){
      const s = String(st || "").trim().toUpperCase();
      return s === "IN_PLAY" || s === "PAUSED" || s === "LIVE" || s === "EXTRA_TIME" || s === "PENALTY_SHOOTOUT";
    }

    function isAssumedLive(st, kick, now){
      // Workaround for occasional feed delays where a match stays TIMED/SCHEDULED during play.
      const s = String(st || "").trim().toUpperCase();
      if (!(s === "TIMED" || s === "SCHEDULED")) return false;
      if (!kick) return false;
      const minsFromKick = minutesBetween(kick, now);
      return minsFromKick >= 0 && minsFromKick <= 180; // 3 hours safety window
    }

    function statusLabel(m){
      const st = String(m.status || "").toUpperCase();
      if (st === "PAUSED") return "HT";
      if (st === "FINISHED") return "FT";
      if (isLiveStatus(st)) return "LIVE";
      if (st === "TIMED" || st === "SCHEDULED") {
        const d = parseUtc(m.utcDate);
        if (!d) return "KO";
        const fmt = new Intl.DateTimeFormat("en-GB", { timeZone: "Europe/London", hour:"2-digit", minute:"2-digit" });
        return fmt.format(d);
      }
      return st;
    }

    function scorePick(m){
      // Prefer fullTime (often holds live score), fall back to regularTime, then halfTime.
      const st = String(m.status || "").toUpperCase();
      const sc = m.score || {};
      const ft = sc.fullTime || {};
      const rt = sc.regularTime || {};
      const ht = sc.halfTime || {};

      const pick = (a,b,c) => (a ?? b ?? c ?? null);
      const home = pick(ft.home, rt.home, ht.home);
      const away = pick(ft.away, rt.away, ht.away);

      // During TIMED/SCHEDULED usually nulls; show blanks (not zero)
      if (!isLiveStatus(st) && st !== "FINISHED") {
        return { home: (home == null ? "" : String(home)), away: (away == null ? "" : String(away)) };
      }
      // During live/finished, if still null for some reason, show 0-0 is misleading; show blanks.
      return { home: (home == null ? "" : String(home)), away: (away == null ? "" : String(away)) };
    }

    async function fetchMatches(){
      const url = `/.netlify/functions/scores?comps=${encodeURIComponent(COMPS.join(","))}`;
      const res = await fetch(url, { cache:"no-store" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Scores function error");
      return data.matches || [];
    }

    function decideMode(sorted, now){
      if (forcedMode === "live" || forcedMode === "welcome") return forcedMode;

      const liveNow = sorted.some(m => m.__live || m.__assumedLive);
      const warm = sorted.some(m => {
        const st = String(m.status || "").toUpperCase();
        if (!(st === "SCHEDULED" || st === "TIMED")) return false;
        const mins = minutesBetween(now, m.__kick);
        return mins >= 0 && mins <= PRE_MIN;
      });

      if (liveNow || warm) return "live";

      // cool-down after last finished (kick + 105)
      const finished = sorted.filter(m => String(m.status || "").toUpperCase() === "FINISHED" && m.__kick);
      if (finished.length){
        const latest = finished.reduce((p,c)=> (c.__kick > p.__kick ? c : p));
        const estEnd = new Date(latest.__kick.getTime() + 105*60000);
        const minsAfter = minutesBetween(estEnd, now);
        if (minsAfter >= 0 && minsAfter <= POST_MIN) return "live";
      }
      return "welcome";
    }

    function annotateSort(matches, now){
      const ms = matches.filter(m => m && m.homeTeam && m.awayTeam && !m.__error);
      const annotated = ms.map(m => {
        const kick = parseUtc(m.utcDate) || null;
        const live = isLiveStatus(m.status);
        const assumedLive = isAssumedLive(m.status, kick, now);
        const isNUFC = (NUFC_ID && (m.homeTeam.id === NUFC_ID || m.awayTeam.id === NUFC_ID));
        return { ...m, __kick:kick, __live:live, __assumedLive:assumedLive, __isNUFC:isNUFC };
      });

      annotated.sort((a,b)=>{
        // pin NUFC first if present in list
        if (a.__isNUFC !== b.__isNUFC) return a.__isNUFC ? -1 : 1;
        // then live-ish
        const aL = a.__live || a.__assumedLive;
        const bL = b.__live || b.__assumedLive;
        if (aL !== bL) return aL ? -1 : 1;
        // then earliest kickoff
        const ak = a.__kick ? a.__kick.getTime() : 0;
        const bk = b.__kick ? b.__kick.getTime() : 0;
        return ak - bk;
      });

      return annotated;
    }

    function toRow(m){
      const sc = scorePick(m);
      return {
        home: m.homeTeam.name || "",
        away: m.awayTeam.name || "",
        hs: sc.home,
        as: sc.away,
        st: m.__assumedLive ? "LIVE" : statusLabel(m),
        nufc: m.__isNUFC,
        comp: m.comp
      };
    }

    async function tick(){
      const now = nowLondon();
      try{
        setDot("warn");
        if (DEBUG && dbgLastPollEl){
          dbgLastPollEl.textContent = new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",hour:"2-digit",minute:"2-digit",second:"2-digit"}).format(now);
        }
        setDebug(`Fetching… (${COMPS.join(",")})`);

        const matches = await fetchMatches();
        const sorted = annotateSort(matches, now);
        if (DEBUG && dbgSeenEl) dbgSeenEl.textContent = String(sorted.length);

        const mode = decideMode(sorted, now);
        document.body.setAttribute("data-mode", mode);
        if (DEBUG && dbgModeEl) dbgModeEl.textContent = mode.toUpperCase();

        // build display list
        let display = sorted.filter(m => {
          const st = String(m.status || "").toUpperCase();
          if (m.__live || m.__assumedLive) return true;
          if (st === "SCHEDULED" || st === "TIMED"){
            const mins = minutesBetween(now, m.__kick);
            return mins >= 0 && mins <= PRE_MIN;
          }
          if (st === "FINISHED"){
            const estEnd = new Date(m.__kick.getTime() + 105*60000);
            const minsAfter = minutesBetween(estEnd, now);
            return minsAfter >= 0 && minsAfter <= POST_MIN;
          }
          return false;
        });

        // if live mode but nothing qualifies, show nearest upcoming (prevents empty screen)
        if (mode === "live" && display.length === 0){
          display = sorted.filter(m => {
            const st = String(m.status || "").toUpperCase();
            return st === "SCHEDULED" || st === "TIMED";
          }).slice(0, MAX_VISIBLE);
        }

        const rows = display.map(toRow);
        render(rows);

        const nextPoll = (() => {
          const live = display.some(m => m.__live || m.__assumedLive);
          if (mode === "live" && live) return 60_000;
          if (mode === "live") return 120_000;
          return 600_000;
        })();

        setDot("good");
        if (DEBUG){
          if (dbgEveryEl) dbgEveryEl.textContent = `${(nextPoll/1000)|0}s`;
          if (dbgNextPollEl) dbgNextPollEl.textContent = `${(nextPoll/1000)|0}s`;
        }
        setDebug(`Mode=${mode.toUpperCase()} | rows=${rows.length} | next poll ${(nextPoll/1000)|0}s`);
        setTimeout(tick, nextPoll);
      }catch(e){
        setDot("bad");
        if (DEBUG && dbgModeEl) dbgModeEl.textContent = "ERROR";
        setDebug(`ERROR: ${e && e.message ? e.message : e}`);
        if (DEBUG){
          if (dbgEveryEl) dbgEveryEl.textContent = "120s";
          if (dbgNextPollEl) dbgNextPollEl.textContent = "120s";
        }
        setTimeout(tick, 120_000);
      }
    }

    // Initial render to avoid blank flashes if forced live
    if (params.get("mode")==="live"){ document.body.setAttribute("data-mode","live"); render(sample3); }

    setDot("clear");
    setTimeout(tick, 500);
  </script>
</body>
</html>
