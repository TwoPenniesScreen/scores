<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>The Two Pennies — Live Scores</title>

  <style>
    @font-face{
      font-family:"TwoPenniesPlain";
      src:url("./assets/Twopenniesplain-Regular.ttf") format("truetype");
      font-display:swap;
    }

    :root{
      --fg: #f3f3f3;
      --muted: rgba(243,243,243,.78);
      --card: rgba(0,0,0,.55);
      --stroke: rgba(255,255,255,.12);
      --rowbg: rgba(0,0,0,.28);
      --rowstroke: rgba(255,255,255,.10);
      --card-max-h: 56vh;
    }

    *{ box-sizing:border-box; }
    html,body{ width:100%; height:100%; margin:0; overflow:hidden; background:#0b0b0b; }
    body{
      font-family: TwoPenniesPlain, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg);
      text-transform: uppercase;
    }

    .bg{
      position:fixed; inset:0;
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
      z-index:0;
    }
    body[data-mode="welcome"] .bg{ background-image:url('./assets/Generic.png'); }
    body[data-mode="live"] .bg{ background-image:url('./assets/Live.png'); }

    .content{
      position:relative;
      z-index: 20;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 60px 80px;
    }

    body[data-mode="welcome"] .scoresCard{ display:none; }
    body[data-mode="live"] .scoresCard{ display:block; }

    .scoresCard{
      width: min(1500px, 82vw);
      max-height: var(--card-max-h);
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: 0 16px 40px rgba(0,0,0,.38);
      padding: 22px 26px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .rows{
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .row{
      border-radius: 18px;
      background: var(--rowbg);
      border: 1px solid var(--rowstroke);
      padding: 12px 16px;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      column-gap: 18px;
      align-items:baseline;
      position: relative;
      padding-left: 64px;
    }

    .row.nufc{
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.75);
    }

    .compChip{
      position:absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-62%);
      min-width: 42px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .5px;
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
      pointer-events:none;
    }

    .scrollViewport{
      overflow:hidden;
      width:100%;
      padding-top: 8px;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
      mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
    }
    .scrollInner{
      display:flex;
      flex-direction:column;
      gap: 12px;
      will-change: transform;
      animation: scrollUp var(--scroll-duration, 40s) linear infinite;
    }
    @keyframes scrollUp{
      to{ transform: translateY(calc(-1 * var(--scroll-distance, 0px))); }
    }

    .team{
      font-size: 30px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      align-self: baseline;
    }
    .team.home{ text-align:right; padding-right: 6px; grid-column:1; }
    .team.away{ text-align:left;  padding-left: 6px; grid-column:3; }

    .scoreLine{
      grid-column:2;
      display:flex;
      flex-direction: column;
      align-items: center;
    }

    .scoreTop{
      display:grid;
      grid-template-columns: 54px 54px 54px;
      align-items: baseline;
      justify-items: center;
      line-height: 1;
    }

    .score{
      font-size: 52px;
      font-weight: 700;
      line-height: 0.9;
      display:inline-block;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
      min-width: 24px;
      text-align:center;
    }

    .vs{
      font-size: 24px;
      font-weight: 500;
      opacity: .92;
      line-height: 1;
      letter-spacing: .5px;
    }

    .status{
      margin-top: 6px;
      width: 162px;
      text-align: center;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 20px;
      font-weight: 500;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    .score.updated{
      transform: translateY(-1px);
      filter: drop-shadow(0 2px 6px rgba(255,255,255,.18));
    }

    .debug{
      position:fixed;
      top: 90px;
      left: 24px;
      z-index: 999999;
      display: none;
      gap:10px;
      opacity: 1;
      pointer-events:auto;
      font-size:14px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.22);
      flex-direction: column;
      max-width: 340px;
    }
    .debug .rowBtns{
      display:flex;
      gap:10px;
      flex-wrap: wrap;
    }
    .debug button{
      font-family:inherit;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.10);
      color: #fff;
      cursor:pointer;
    }
    .debugInfo{
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.18);
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: baseline;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }
    .debugInfo .k{ opacity: .85; }
    .debugInfo .v{ text-align:right; }

    #statusDot{
      position: fixed;
      top: 6px;
      left: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: transparent;
      z-index: 1000000;
      pointer-events: none;
    }
  </style>
</head>

<body data-mode="welcome">
  <div class="bg" aria-hidden="true"></div>
  <div id="statusDot" aria-hidden="true"></div>

  <div class="debug" aria-label="Debug controls">
    <div class="rowBtns">
      <button id="btnWelcome" type="button">WELCOME</button>
      <button id="btnLive" type="button">LIVE</button>
    </div>

    <div id="debugStatus" style="color:rgba(255,255,255,.85);font-size:13px;white-space:nowrap;"></div>

    <div class="debugInfo" aria-hidden="true">
      <div class="k">Mode</div><div class="v" id="dbgMode">—</div>
      <div class="k">Last poll</div><div class="v" id="dbgLastPoll">—</div>
      <div class="k">Next poll</div><div class="v" id="dbgNextPoll">—</div>
      <div class="k">Every</div><div class="v" id="dbgEvery">—</div>
      <div class="k">Rows</div><div class="v" id="dbgRows">—</div>
      <div class="k">Comps</div><div class="v" id="dbgComps">—</div>
      <div class="k">Error</div><div class="v" id="dbgErr">—</div>
    </div>
  </div>

  <div class="content">
    <div class="scoresCard" aria-label="Scores card">
      <div class="rows" id="rowsPinned"></div>
      <div class="scrollViewport" id="scrollViewport" style="display:none;"></div>
    </div>
  </div>

  <script>
    /*****************************************************************
     * PARAMS / CONFIG
     *****************************************************************/
    const params = new URLSearchParams(window.location.search);

    const DEBUG = params.get("debug") === "1";
    const forcedMode = (params.get("mode") || "").toLowerCase(); // "live" | "welcome" | ""

    const COMPS = (params.get("comps") || "PL,CL,EC,WC")
      .split(",").map(s => s.trim().toUpperCase()).filter(Boolean);

    const MAX_VISIBLE = Math.max(1, Math.min(8, parseInt(params.get("max") || "5", 10)));
    const PRE_MIN = Math.max(0, Math.min(2880, parseInt(params.get("pre") || "60", 10)));
    const POST_MIN = Math.max(0, Math.min(720, parseInt(params.get("post") || "120", 10)));
    const NUFC_ID = parseInt(params.get("nufcId") || "67", 10);

    window.__MAX_VISIBLE = MAX_VISIBLE;

    const GAP = 12;

    /*****************************************************************
     * DEBUG UI
     *****************************************************************/
    const debugPanel = document.querySelector(".debug");
    const debugStatus = document.getElementById("debugStatus");
    const dbgModeEl = document.getElementById("dbgMode");
    const dbgLastPollEl = document.getElementById("dbgLastPoll");
    const dbgNextPollEl = document.getElementById("dbgNextPoll");
    const dbgEveryEl = document.getElementById("dbgEvery");
    const dbgRowsEl = document.getElementById("dbgRows");
    const dbgCompsEl = document.getElementById("dbgComps");
    const dbgErrEl = document.getElementById("dbgErr");

    if (debugPanel) debugPanel.style.display = DEBUG ? "block" : "none";
    if (dbgRowsEl) dbgRowsEl.textContent = String(MAX_VISIBLE);
    if (dbgCompsEl) dbgCompsEl.textContent = COMPS.join(",");

    function setDebug(text){
      if (debugStatus) debugStatus.textContent = text || "";
    }
    function setErr(text){
      if (dbgErrEl) dbgErrEl.textContent = text || "—";
    }

    const setMode = (m) => document.body.setAttribute("data-mode", m);
    const btnWelcome = document.getElementById("btnWelcome");
    const btnLive = document.getElementById("btnLive");
    if (btnWelcome) btnWelcome.onclick = () => setMode("welcome");
    if (btnLive) btnLive.onclick = () => setMode("live");

    const statusDot = document.getElementById("statusDot");
    function setDot(state){
      if (!statusDot) return;
      if (state === "clear") statusDot.style.background = "transparent";
      else if (state === "good") statusDot.style.background = "#18c46c";
      else if (state === "warn") statusDot.style.background = "#f2b01e";
      else statusDot.style.background = "#e53935";
    }

    function londonTimeHHMM(date){
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: "Europe/London",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }
    function londonTimeHHMMSS(date){
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: "Europe/London",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }).format(date);
    }

    /*****************************************************************
     * RENDERER (pins NUFC, scrolls overflow, updates in-place)
     *****************************************************************/
    const rowsPinned = document.getElementById('rowsPinned');
    const scrollViewport = document.getElementById('scrollViewport');

    const state = {
      built: false,
      orderKey: "",
      pinnedId: null,
      scrollInner: null,
    };

    function setText(el, val){
      const next = (val === null || val === undefined) ? "" : String(val);
      if (el && el.textContent !== next) el.textContent = next;
    }

    function createRowEl(r){
      const row = document.createElement("div");
      row.className = `row${r.nufc ? " nufc" : ""}`;
      row.dataset.id = String(r.id || "");

      row.innerHTML = `
        <div class="compChip">${String(r.comp || "").toUpperCase()}</div>
        <div class="team home"></div>
        <div class="scoreLine">
          <div class="scoreTop">
            <span class="score scoreHome"></span>
            <span class="vs">vs</span>
            <span class="score scoreAway"></span>
          </div>
          <div class="status"></div>
        </div>
        <div class="team away"></div>
      `;

      updateRowEl(row, r, false);
      return row;
    }

    function updateRowEl(row, r, flash=true){
      setText(row.querySelector(".team.home"), r.home);
      setText(row.querySelector(".team.away"), r.away);
      setText(row.querySelector(".status"), r.st);

      const homeScoreEl = row.querySelector(".scoreHome");
      const awayScoreEl = row.querySelector(".scoreAway");

      const hs = (r.hs === null || r.hs === undefined) ? "" : String(r.hs);
      const as = (r.as === null || r.as === undefined) ? "" : String(r.as);

      const changed = (homeScoreEl.textContent !== hs) || (awayScoreEl.textContent !== as);

      setText(homeScoreEl, hs);
      setText(awayScoreEl, as);

      row.classList.toggle("nufc", !!r.nufc);

      if (flash && changed){
        homeScoreEl.classList.add("updated");
        awayScoreEl.classList.add("updated");
        setTimeout(() => {
          homeScoreEl.classList.remove("updated");
          awayScoreEl.classList.remove("updated");
        }, 350);
      }
    }

    function ensureScrollStructure(){
      if (!state.scrollInner){
        const inner = document.createElement("div");
        inner.className = "scrollInner";
        scrollViewport.innerHTML = "";
        scrollViewport.appendChild(inner);
        state.scrollInner = inner;
      }
    }

    function makeOrderKey(pinned, scrollUnique, visibleSlots){
      const pinnedId = pinned ? pinned.id : "";
      const ids = scrollUnique.map(x => x.id).join(",");
      return `${pinnedId}|${visibleSlots}|${ids}`;
    }

    function buildUI(pinned, scrollUnique, visibleSlots){
      rowsPinned.innerHTML = "";
      state.pinnedId = null;

      if (pinned){
        rowsPinned.appendChild(createRowEl(pinned));
        state.pinnedId = pinned.id;
      }

      scrollViewport.style.display = "none";
      scrollViewport.innerHTML = "";
      state.scrollInner = null;

      if (scrollUnique.length){
        ensureScrollStructure();

        // duplicate set for seamless scroll
        const dup = scrollUnique.concat(scrollUnique);
        for (const r of dup) state.scrollInner.appendChild(createRowEl(r));

        scrollViewport.style.display = "block";

        requestAnimationFrame(() => {
          const firstRow = state.scrollInner.querySelector(".row");
          if (!firstRow) return;

          const rowH = firstRow.getBoundingClientRect().height;
          const viewportH = (rowH * visibleSlots) + (GAP * (visibleSlots - 1));
          scrollViewport.style.height = `${viewportH}px`;

          const rows = state.scrollInner.querySelectorAll(".row");
          let dist = 0;
          for (let i=0; i<scrollUnique.length; i++){
            dist += rows[i].getBoundingClientRect().height;
            if (i < scrollUnique.length - 1) dist += GAP;
          }

          const secondsPerRow = 7;
          const duration = Math.max(20, scrollUnique.length * secondsPerRow);

          scrollViewport.style.setProperty("--scroll-distance", `${dist}px`);
          state.scrollInner.style.setProperty("--scroll-distance", `${dist}px`);
          state.scrollInner.style.setProperty("--scroll-duration", `${duration}s`);
        });
      }

      state.orderKey = makeOrderKey(pinned, scrollUnique, visibleSlots);
      state.built = true;
    }

    function renderRows(list){
      // list: [{id, home, away, hs, as, st, nufc, comp}]
      const pinned = list.find(r => r.nufc) || null;
      const rest = pinned ? list.filter(r => r.id !== pinned.id) : list.slice();

      const visibleSlots = pinned ? (MAX_VISIBLE - 1) : MAX_VISIBLE;
      const scrollUnique = (rest.length > visibleSlots) ? rest : [];

      const nextKey = makeOrderKey(pinned, scrollUnique, visibleSlots);
      if (!state.built || nextKey !== state.orderKey){
        buildUI(pinned, scrollUnique, visibleSlots);
        return;
      }

      // update pinned
      if (pinned && state.pinnedId){
        const pinnedRow = rowsPinned.querySelector(`.row[data-id="${state.pinnedId}"]`);
        if (pinnedRow) updateRowEl(pinnedRow, pinned, true);
      }

      // update scroll (both copies)
      if (scrollUnique.length && state.scrollInner){
        const map = new Map(scrollUnique.map(r => [String(r.id), r]));
        const scrollRows = state.scrollInner.querySelectorAll(".row");
        for (const row of scrollRows){
          const data = map.get(row.dataset.id);
          if (data) updateRowEl(row, data, true);
        }
      }
    }

    /*****************************************************************
     * MATCH LOGIC
     *****************************************************************/
    function parseUtc(utcStr){
      const d = new Date(utcStr);
      return isNaN(d.getTime()) ? null : d;
    }

    function minutesBetween(a, b){
      return (b.getTime() - a.getTime()) / 60000;
    }

    function isLiveStatus(st){
      const s = String(st || "").trim().toUpperCase();
      return s === "IN_PLAY" || s === "PAUSED" || s === "LIVE";
    }

    function statusLabel(m){
      const st = String(m.status || "").toUpperCase();
      if (st === "PAUSED") return "HT";
      if (st === "FINISHED") return "FT";
      if (st === "IN_PLAY" || st === "LIVE") return "LIVE";

      if (st === "SCHEDULED" || st === "TIMED"){
        const d = parseUtc(m.utcDate);
        return d ? londonTimeHHMM(d) : "KO";
      }
      return st;
    }

    // football-data often uses score.fullTime for the current live score
    function scoresFor(m){
      const ft = m.score?.fullTime || {};
      const ht = m.score?.halfTime || {};
      const hs = (ft.home ?? ht.home ?? null);
      const as = (ft.away ?? ht.away ?? null);
      return { hs, as };
    }

    function compPriority(comp){
      const i = COMPS.indexOf(String(comp||"").toUpperCase());
      return i === -1 ? 999 : i;
    }

    function annotate(matches){
      return matches.map(m => {
        const kick = parseUtc(m.utcDate) || new Date(0);
        const live = isLiveStatus(m.status);
        const homeId = m.homeTeam?.id;
        const awayId = m.awayTeam?.id;
        const isNUFC = !!NUFC_ID && (homeId === NUFC_ID || awayId === NUFC_ID);
        return { ...m, __kick:kick, __live:live, __isNUFC:isNUFC };
      });
    }

    function decideMode(annotated, now){
      if (forcedMode === "live" || forcedMode === "welcome") return forcedMode;

      const anyLive = annotated.some(m => m.__live);
      if (anyLive) return "live";

      const anyWarm = annotated.some(m => {
        const st = String(m.status || "").toUpperCase();
        if (st !== "SCHEDULED" && st !== "TIMED") return false;
        const minsToKO = minutesBetween(now, m.__kick);
        return minsToKO >= 0 && minsToKO <= PRE_MIN;
      });
      if (anyWarm) return "live";

      const anyRecentFinished = annotated.some(m => {
        const st = String(m.status || "").toUpperCase();
        if (st !== "FINISHED") return false;
        const estEnd = new Date(m.__kick.getTime() + 105*60000);
        const minsAfter = minutesBetween(estEnd, now);
        return minsAfter >= 0 && minsAfter <= POST_MIN;
      });
      if (anyRecentFinished) return "live";

      return "welcome";
    }

    function selectForDisplay(annotated, now){
      // live OR within pre window OR within post window
      let list = annotated.filter(m => {
        const st = String(m.status || "").toUpperCase();

        if (isLiveStatus(st)) return true;

        if (st === "SCHEDULED" || st === "TIMED"){
          const minsToKO = minutesBetween(now, m.__kick);
          return minsToKO >= 0 && minsToKO <= PRE_MIN;
        }

        if (st === "FINISHED"){
          const estEnd = new Date(m.__kick.getTime() + 105*60000);
          const minsAfter = minutesBetween(estEnd, now);
          return minsAfter >= 0 && minsAfter <= POST_MIN;
        }

        return false;
      });

      // If nothing matched, show next upcoming (avoid blank card)
      if (list.length === 0){
        const upcoming = annotated
          .filter(m => {
            const st = String(m.status||"").toUpperCase();
            return st === "SCHEDULED" || st === "TIMED";
          })
          .sort((a,b)=> a.__kick - b.__kick)
          .slice(0, MAX_VISIBLE);
        list = upcoming;
      }

      // sort (NUFC pinned first, then live, then comp order, then kick)
      list.sort((a,b) => {
        if (a.__isNUFC !== b.__isNUFC) return a.__isNUFC ? -1 : 1;
        if (a.__live !== b.__live) return a.__live ? -1 : 1;
        const cp = compPriority(a.comp) - compPriority(b.comp);
        if (cp !== 0) return cp;
        return a.__kick - b.__kick;
      });

      return list;
    }

    function toRow(m){
      const { hs, as } = scoresFor(m);
      return {
        id: m.id,
        home: m.homeTeam?.name || "",
        away: m.awayTeam?.name || "",
        hs: (hs === null || hs === undefined) ? "" : String(hs),
        as: (as === null || as === undefined) ? "" : String(as),
        st: statusLabel(m),
        nufc: !!m.__isNUFC,
        comp: String(m.comp || "").toUpperCase(),
      };
    }

    /*****************************************************************
     * FETCH + TICK
     *****************************************************************/
    async function fetchMatches(){
      const url = `/.netlify/functions/scores?comps=${encodeURIComponent(COMPS.join(","))}`;
      const res = await fetch(url, { cache:"no-store" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Unknown API error");
      return Array.isArray(data.matches) ? data.matches : [];
    }

    async function tick(){
      const now = new Date();

      try{
        setErr("—");
        setDot("warn");
        setDebug(`Fetching… (${COMPS.join(",")})`);

        if (DEBUG && dbgLastPollEl) dbgLastPollEl.textContent = londonTimeHHMMSS(now);

        const matches = await fetchMatches();
        const annotated = annotate(matches);
        const mode = decideMode(annotated, now);

        setMode(mode);
        if (DEBUG && dbgModeEl) dbgModeEl.textContent = mode.toUpperCase();

        if (mode === "live"){
          const display = selectForDisplay(annotated, now);
          const rows = display.map(toRow);
          renderRows(rows);
        }

        const hasLive = annotated.some(m => m.__live);
        const hasWarm = annotated.some(m => {
          const st = String(m.status || "").toUpperCase();
          if (st !== "SCHEDULED" && st !== "TIMED") return false;
          const minsToKO = minutesBetween(now, m.__kick);
          return minsToKO >= 0 && minsToKO <= PRE_MIN;
        });

        const nextPollMs =
          (mode === "live" && hasLive) ? 20_000 :
          (mode === "live" && hasWarm) ? 60_000 :
          (mode === "live") ? 90_000 :
          300_000;

        setDot("good");
        if (DEBUG){
          if (dbgEveryEl) dbgEveryEl.textContent = `${Math.round(nextPollMs/1000)}s`;
          if (dbgNextPollEl) dbgNextPollEl.textContent = `${Math.round(nextPollMs/1000)}s`;
        }
        setDebug(`Mode=${mode.toUpperCase()} | next ${Math.round(nextPollMs/1000)}s`);

        setTimeout(tick, nextPollMs);
      } catch (e){
        setDot("bad");
        setErr(String(e && e.message ? e.message : e));
        setDebug(`ERROR: ${String(e && e.message ? e.message : e)}`);
        setTimeout(tick, 60_000);
      }
    }

    // start
    setDot("clear");
    if (forcedMode === "live" || forcedMode === "welcome") setMode(forcedMode);
    tick();
  </script>
</body>
</html>
