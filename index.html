<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>The Two Pennies — Live Scores</title>

  <style>
    @font-face{
      font-family:"TwoPenniesPlain";
      src:url("./assets/Twopenniesplain-Regular.ttf") format("truetype");
      font-display:swap;
    }

    :root{
      --fg: #f3f3f3;
      --muted: rgba(243,243,243,.78);
      --card: rgba(0,0,0,.55);
      --stroke: rgba(255,255,255,.12);
      --rowbg: rgba(0,0,0,.28);
      --rowstroke: rgba(255,255,255,.10);
      --card-max-h: 56vh;
    }

    *{ box-sizing:border-box; }
    html,body{ width:100%; height:100%; margin:0; overflow:hidden; background:#0b0b0b; }
    body{
      font-family: TwoPenniesPlain, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg);
      text-transform: uppercase;
    }

    .bg{
      position:fixed; inset:0;
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
      z-index:0;
    }
    body[data-mode="welcome"] .bg{ background-image:url('./assets/Generic.png'); }
    body[data-mode="live"] .bg{ background-image:url('./assets/Live.png'); }

    .content{
      position:relative;
      z-index: 20;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 60px 80px;
    }

    body[data-mode="welcome"] .scoresCard{ display:none; }
    body[data-mode="live"] .scoresCard{ display:block; }

    .scoresCard{
      width: min(1500px, 82vw);
      max-height: var(--card-max-h);
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: 0 16px 40px rgba(0,0,0,.38);
      padding: 22px 26px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .rows{
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .row{
      border-radius: 18px;
      background: var(--rowbg);
      border: 1px solid var(--rowstroke);
      padding: 12px 16px;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      column-gap: 18px;
      align-items:baseline;
      position: relative;
      padding-left: 64px;
    }

    .row.nufc{
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.75);
    }

    .compChip{
      position:absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-62%);
      min-width: 42px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .5px;
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
      pointer-events:none;
    }

    .scrollViewport{
      overflow:hidden;
      width:100%;
      padding-top: 8px;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
      mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
    }
    .scrollInner{
      display:flex;
      flex-direction:column;
      gap: 12px;
      will-change: transform;
      animation: scrollUp var(--scroll-duration, 40s) linear infinite;
    }
    @keyframes scrollUp{
      to{ transform: translateY(calc(-1 * var(--scroll-distance, 0px))); }
    }

    .team{
      font-size: 30px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      align-self: baseline;
    }
    .team.home{ text-align:right; padding-right: 6px; grid-column:1; }
    .team.away{ text-align:left;  padding-left: 6px; grid-column:3; }

    .scoreLine{
      grid-column:2;
      display:flex;
      flex-direction: column;
      align-items: center;
    }

    .scoreTop{
      display:grid;
      grid-template-columns: 54px 54px 54px;
      align-items: baseline;
      justify-items: center;
      line-height: 1;
    }

    .score{
      font-size: 52px;
      font-weight: 700;
      line-height: 0.9;
      display:inline-block;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
      min-width: 24px;
      text-align:center;
    }

    .vs{
      font-size: 24px;
      font-weight: 500;
      opacity: .92;
      line-height: 1;
      letter-spacing: .5px;
    }

    .status{
      margin-top: 6px;
      width: 162px;
      text-align: center;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 20px;
      font-weight: 500;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    .score.updated{
      transform: translateY(-1px);
      filter: drop-shadow(0 2px 6px rgba(255,255,255,.18));
    }

    .debug{
      position:fixed;
      top: 90px;
      left: 24px;
      z-index: 999999;
      display: none;
      gap:10px;
      opacity: 1;
      pointer-events:auto;
      font-size:14px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.22);
    }
    .debug button{
      font-family:inherit;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.10);
      color: #fff;
    }

    #statusDot{
      position: fixed;
      top: 6px;
      left: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: transparent;
      z-index: 1000000;
      pointer-events: none;
    }

    .debugInfo{
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.18);
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: baseline;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }
    .debugInfo .k{ opacity: .85; }
    .debugInfo .v{ text-align:right; }
  </
