<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>The Two Pennies — Live Scores</title>

  <style>
    @font-face{
      font-family:"TwoPenniesPlain";
      src:url("./assets/Twopenniesplain-Regular.ttf") format("truetype");
      font-display:swap;
    }

    :root{
      --fg: #f3f3f3;
      --muted: rgba(243,243,243,.78);
      --card: rgba(0,0,0,.55);
      --stroke: rgba(255,255,255,.12);
      --rowbg: rgba(0,0,0,.28);
      --rowstroke: rgba(255,255,255,.10);
      --card-max-h: 56vh;
    }

    *{ box-sizing:border-box; }
    html,body{ width:100%; height:100%; margin:0; overflow:hidden; background:#0b0b0b; }
    body{
      font-family: TwoPenniesPlain, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg);
      text-transform: uppercase;
    }

    .bg{
      position:fixed; inset:0;
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
      z-index:0;
    }
    body[data-mode="welcome"] .bg{ background-image:url('./assets/Generic.png'); }
    body[data-mode="live"] .bg{ background-image:url('./assets/Live.png'); }

    .content{
      position:relative;
      z-index: 20;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 60px 80px;
    }

    body[data-mode="welcome"] .scoresCard{ display:none; }
    body[data-mode="live"] .scoresCard{ display:block; }

    .scoresCard{
      width: min(1500px, 82vw);
      max-height: var(--card-max-h);
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--stroke);
      box-shadow: 0 16px 40px rgba(0,0,0,.38);
      padding: 22px 26px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .rows{
      display:flex;
      flex-direction:column;
      gap: 12px;
      overflow: hidden;
    }

    .row{
      border-radius: 18px;
      background: var(--rowbg);
      border: 1px solid var(--rowstroke);
      padding: 12px 16px;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      column-gap: 18px;
      align-items:baseline;
      position: relative;
      padding-left: 64px;
    }

    .row.nufc{
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.75);
    }

    .compChip{
      position:absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-62%);
      min-width: 42px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .5px;
      color: rgba(255,255,255,.88);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
      pointer-events:none;
    }

    .scrollViewport{
      overflow:hidden;
      width:100%;
      padding-top: 8px;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
      mask-image: linear-gradient(to bottom, transparent 0px, black 22px, black 100%);
    }
    .scrollInner{
      display:flex;
      flex-direction:column;
      gap: 12px;
      will-change: transform;
      animation: scrollUp var(--scroll-duration, 40s) linear infinite;
    }
    @keyframes scrollUp{
      to{ transform: translateY(calc(-1 * var(--scroll-distance, 0px))); }
    }

    .team{
      font-size: 30px;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      align-self: baseline;
    }
    .team.home{ text-align:right; padding-right: 6px; grid-column:1; }
    .team.away{ text-align:left;  padding-left: 6px; grid-column:3; }

    .scoreLine{
      grid-column:2;
      display:flex;
      flex-direction: column;
      align-items: center;
    }

    .scoreTop{
      display:grid;
      grid-template-columns: 54px 54px 54px;
      align-items: baseline;
      justify-items: center;
      line-height: 1;
    }

    .score{
      font-size: 52px;
      font-weight: 700;
      line-height: 0.9;
      display:inline-block;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
      min-width: 24px;
      text-align:center;
    }

    .vs{
      font-size: 24px;
      font-weight: 500;
      opacity: .92;
      line-height: 1;
      letter-spacing: .5px;
    }

    .status{
      margin-top: 6px;
      width: 162px;
      text-align: center;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 20px;
      font-weight: 500;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }

    .score.updated{
      transform: translateY(-1px);
      filter: drop-shadow(0 2px 6px rgba(255,255,255,.18));
    }

    .debug{
      position:fixed;
      top: 90px;
      left: 24px;
      z-index: 999999;
      display: none;
      gap:10px;
      opacity: 1;
      pointer-events:auto;
      font-size:14px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.22);
    }
    .debug button{
      font-family:inherit;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.10);
      color: #fff;
    }

    #statusDot{
      position: fixed;
      top: 6px;
      left: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: transparent;
      z-index: 1000000;
      pointer-events: none;
    }

    .debugInfo{
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.18);
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: baseline;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }
    .debugInfo .k{ opacity: .85; }
    .debugInfo .v{ text-align:right; }
  </style>
</head>

<body data-mode="welcome">
  <div class="bg" aria-hidden="true"></div>
  <div id="statusDot" aria-hidden="true"></div>

  <div class="debug" aria-label="Debug controls">
    <button id="btnWelcome" type="button">WELCOME</button>
    <button id="btnLive" type="button">LIVE</button>

    <div id="debugStatus" style="margin-top:6px;color:rgba(255,255,255,.85);font-size:13px;white-space:nowrap;"></div>

    <div class="debugInfo" aria-hidden="true">
      <div class="k">Mode</div><div class="v" id="dbgMode">—</div>
      <div class="k">Last poll</div><div class="v" id="dbgLastPoll">—</div>
      <div class="k">Every</div><div class="v" id="dbgEvery">—</div>
      <div class="k">Rows</div><div class="v" id="dbgRows">—</div>
      <div class="k">Comps</div><div class="v" id="dbgComps">—</div>
    </div>
  </div>

  <div class="content">
    <div class="scoresCard" aria-label="Scores card">
      <div class="rows" id="rowsPinned"></div>
      <div class="scrollViewport" id="scrollViewport" style="display:none;"></div>
    </div>
  </div>

  <script>
    /*****************************************************************
     * 1) RENDERER
     *****************************************************************/
    const rowsPinned = document.getElementById('rowsPinned');
    const scrollViewport = document.getElementById('scrollViewport');

    const MAX_VISIBLE_DEFAULT = 5;
    const GAP = 12;

    const state = {
      pinnedId: null,
      orderKey: "",
      built: false,
      scrollInner: null,
    };

    function maxVisible(){
      return (typeof window.__MAX_VISIBLE === 'number' ? window.__MAX_VISIBLE : MAX_VISIBLE_DEFAULT);
    }

    function setText(el, val){
      const next = (val === null || val === undefined) ? "" : String(val);
      if (el.textContent !== next) el.textContent = next;
    }

    function createRowEl(r){
      const row = document.createElement("div");
      row.className = `row${r.nufc ? " nufc" : ""}`;
      row.dataset.id = String(r.id || "");

      row.innerHTML = `
        <div class="compChip">${String(r.comp || "").toUpperCase()}</div>
        <div class="team home"></div>
        <div class="scoreLine">
          <div class="scoreTop">
            <span class="score scoreHome"></span>
            <span class="vs">vs</span>
            <span class="score scoreAway"></span>
          </div>
          <div class="status"></div>
        </div>
        <div class="team away"></div>
      `;

      updateRowEl(row, r, false);
      return row;
    }

    function updateRowEl(row, r, flash=true){
      setText(row.querySelector(".team.home"), r.home);
      setText(row.querySelector(".team.away"), r.away);
      setText(row.querySelector(".status"), r.st);

      const homeScoreEl = row.querySelector(".scoreHome");
      const awayScoreEl = row.querySelector(".scoreAway");

      const hs = (r.hs === null || r.hs === undefined) ? "" : String(r.hs);
      const as = (r.as === null || r.as === undefined) ? "" : String(r.as);

      const changed = (homeScoreEl.textContent !== hs) || (awayScoreEl.textContent !== as);

      setText(homeScoreEl, hs);
      setText(awayScoreEl, as);

      row.classList.toggle("nufc", !!r.nufc);

      if (flash && changed){
        homeScoreEl.classList.add("updated");
        awayScoreEl.classList.add("updated");
        setTimeout(() => {
          homeScoreEl.classList.remove("updated");
          awayScoreEl.classList.remove("updated");
        }, 350);
      }
    }

    function computePinnedAndScroll(list){
      let pinned = null;
      const rest = [];
      for (const g of list){
        if (!pinned && g.nufc) pinned = g;
        else rest.push(g);
      }
      const maxVis = maxVisible();
      const visibleSlots = pinned ? (maxVis - 1) : maxVis;
      const scrollUnique = (rest.length > visibleSlots) ? rest : [];
      return { pinned, scrollUnique, visibleSlots };
    }

    function makeOrderKey(pinned, scrollUnique, visibleSlots){
      const pinnedId = pinned ? pinned.id : "";
      const ids = scrollUnique.map(x => x.id).join(",");
      return `${pinnedId}|${visibleSlots}|${ids}`;
    }

    function ensureScrollStructure(){
      if (!state.scrollInner){
        const inner = document.createElement("div");
        inner.className = "scrollInner";
        scrollViewport.innerHTML = "";
        scrollViewport.appendChild(inner);
        state.scrollInner = inner;
      }
    }

    function buildUI(list){
      const { pinned, scrollUnique, visibleSlots } = computePinnedAndScroll(list);

      rowsPinned.innerHTML = "";
      state.pinnedId = null;

      if (pinned){
        rowsPinned.appendChild(createRowEl(pinned));
        state.pinnedId = pinned.id;
      }

      scrollViewport.style.display = "none";
      scrollViewport.innerHTML = "";
      state.scrollInner = null;

      if (scrollUnique.length){
        ensureScrollStructure();

        const dup = scrollUnique.concat(scrollUnique);
        for (const r of dup){
          state.scrollInner.appendChild(createRowEl(r));
        }

        scrollViewport.style.display = "block";

        requestAnimationFrame(() => {
          const firstRow = state.scrollInner.querySelector(".row");
          if (!firstRow) return;

          const rowH = firstRow.getBoundingClientRect().height;
          const viewportH = (rowH * visibleSlots) + (GAP * (visibleSlots - 1));
          scrollViewport.style.height = `${viewportH}px`;

          const rows = state.scrollInner.querySelectorAll(".row");
          let dist = 0;
          for (let i=0; i<scrollUnique.length; i++){
            dist += rows[i].getBoundingClientRect().height;
            if (i < scrollUnique.length - 1) dist += GAP;
          }

          const secondsPerRow = 7;
          const duration = Math.max(20, scrollUnique.length * secondsPerRow);

          scrollViewport.style.setProperty("--scroll-distance", `${dist}px`);
          state.scrollInner.style.setProperty("--scroll-distance", `${dist}px`);
          state.scrollInner.style.setProperty("--scroll-duration", `${duration}s`);
        });
      }

      state.orderKey = makeOrderKey(pinned, scrollUnique, visibleSlots);
      state.built = true;
    }

    function updateUI(list){
      const { pinned, scrollUnique, visibleSlots } = computePinnedAndScroll(list);
      const nextKey = makeOrderKey(pinned, scrollUnique, visibleSlots);

      if (!state.built || nextKey !== state.orderKey){
        buildUI(list);
        return;
      }

      if (pinned && state.pinnedId){
        const pinnedRow = rowsPinned.querySelector(`.row[data-id="${state.pinnedId}"]`);
        if (pinnedRow) updateRowEl(pinnedRow, pinned, true);
      }

      if (scrollUnique.length && state.scrollInner){
        const map = new Map(scrollUnique.map(r => [String(r.id), r]));
        const scrollRows = state.scrollInner.querySelectorAll(".row");
        for (const row of scrollRows){
          const id = row.dataset.id;
          const data = map.get(id);
          if (data) updateRowEl(row, data, true);
        }
      }
    }

    window.render = function(list){
      updateUI(list);
    };

    /*****************************************************************
     * 2) POLLING + BUSINESS RULES
     *****************************************************************/
    const params = new URLSearchParams(window.location.search);
    const DEBUG = params.get("debug") === "1";
    const forcedMode = (params.get("mode") || "").toLowerCase();

    const MAX_VISIBLE = Math.max(1, Math.min(8, parseInt(params.get("max") || "5", 10)));
    const PRE_MIN  = Math.max(0, Math.min(2880, parseInt(params.get("pre")  || "60", 10)));
    const POST_MIN = Math.max(0, Math.min(720,  parseInt(params.get("post") || "120", 10)));
    const NUFC_ID  = parseInt(params.get("nufcId") || "67", 10);

    window.__MAX_VISIBLE = MAX_VISIBLE;

    const debugStatus = document.getElementById("debugStatus");
    const debugPanel = document.querySelector(".debug");
    if (debugPanel) debugPanel.style.display = DEBUG ? "flex" : "none";
    if (debugStatus) debugStatus.style.display = DEBUG ? "block" : "none";

    const dbgModeEl = document.getElementById("dbgMode");
    const dbgLastPollEl = document.getElementById("dbgLastPoll");
    const dbgEveryEl = document.getElementById("dbgEvery");
    const dbgRowsEl = document.getElementById("dbgRows");
    const dbgCompsEl = document.getElementById("dbgComps");

    if (DEBUG){
      if (dbgRowsEl) dbgRowsEl.textContent = String(MAX_VISIBLE);
    }

    const setMode = (m) => document.body.setAttribute("data-mode", m);
    (() => { const el=document.getElementById("btnWelcome"); if(el) el.onclick = () => setMode("welcome"); })();
    (() => { const el=document.getElementById("btnLive"); if(el) el.onclick = () => setMode("live"); })();

    const statusDot = document.getElementById("statusDot");
    function setDot(state){
      if (!statusDot) return;
      if (state === "clear") statusDot.style.background = "transparent";
      else if (state === "good") statusDot.style.background = "#18c46c";
      else if (state === "warn") statusDot.style.background = "#f2b01e";
      else statusDot.style.background = "#e53935";
    }
    function setDebug(text){
      if (!debugStatus) return;
      debugStatus.textContent = text;
    }

    const COMPS = (params.get("comps") || "PL,CL,EC,WC")
      .split(",").map(s=>s.trim().toUpperCase()).filter(Boolean);
    if (DEBUG && dbgCompsEl) dbgCompsEl.textContent = COMPS.join(",");

    function londonNow(){
      return new Date(new Intl.DateTimeFormat("en-US", {
        timeZone: "Europe/London",
        hour12:false,
        year:"numeric", month:"2-digit", day:"2-digit",
        hour:"2-digit", minute:"2-digit", second:"2-digit"
      }).format(new Date())
        .replace(/(\d{2})\/(\d{2})\/(\d{4}),\s*/,"$3-$1-$2T")
        .replace(" ", "")
      );
    }

    function parseUtc(utcStr){
      const d = new Date(utcStr);
      return isNaN(d.getTime()) ? null : d;
    }

    function minutesBetween(a, b){
      return (b.getTime() - a.getTime()) / 60000;
    }

    function isLiveStatus(st){
      const s = String(st || "").trim().toUpperCase();
      return s === "IN_PLAY" || s === "PAUSED" || s === "LIVE";
    }

    function statusLabel(match){
      const st = String(match.status || "").toUpperCase();
      if (st === "PAUSED") return "HT";
      if (st === "FINISHED") return "FT";
      if (st === "IN_PLAY" || st === "LIVE") return "LIVE";
      if (st === "SCHEDULED" || st === "TIMED") {
        const d = parseUtc(match.utcDate);
        if (!d) return "KO";
        const fmt = new Intl.DateTimeFormat("en-GB", { timeZone: "Europe/London", hour:"2-digit", minute:"2-digit" });
        return fmt.format(d);
      }
      return st;
    }

    function scoresFor(match){
      const ft = match.score?.fullTime || {};
      const ht = match.score?.halfTime || {};
      const hs = (ft.home ?? ht.home ?? null);
      const as = (ft.away ?? ht.away ?? null);
      return { home: hs, away: as };
    }

    function competitionPriority(comp){
      const i = COMPS.indexOf(comp);
      return i === -1 ? 999 : i;
    }

    function pinAndSort(matches){
      const annotated = matches.map(m => {
        const kick = parseUtc(m.utcDate) || new Date(0);
        const live = isLiveStatus(m.status);
        const isNUFC = (!!NUFC_ID && (m.homeTeam?.id === NUFC_ID || m.awayTeam?.id === NUFC_ID));
        const pin = !!(isNUFC && live);
        return { ...m, __kick:kick, __live:live, __isNUFC:isNUFC, __pin:pin };
      });

      annotated.sort((a,b) => {
        if (a.__pin !== b.__pin) return a.__pin ? -1 : 1;
        if (a.__live !== b.__live) return a.__live ? -1 : 1;
        const cp = competitionPriority(String(a.comp||"").toUpperCase()) - competitionPriority(String(b.comp||"").toUpperCase());
        if (cp !== 0) return cp;
        return a.__kick.getTime() - b.__kick.getTime();
      });

      return annotated;
    }

    function decideMode(sorted, now){
      if (forcedMode === "live" || forcedMode === "welcome") return forcedMode;

      const liveNow = sorted.some(m => isLiveStatus(m.status));
      const warm = sorted.some(m => {
        const st = String(m.status || "").toUpperCase();
        if (st !== "SCHEDULED" && st !== "TIMED") return false;
        const mins = minutesBetween(now, m.__kick);
        return mins >= 0 && mins <= PRE_MIN;
      });

      if (liveNow || warm) return "live";

      const finished = sorted.filter(m => String(m.status || "").toUpperCase() === "FINISHED" && m.__kick.getTime() > 0);
      if (finished.length) {
        const latest = finished.reduce((p,c)=> (c.__kick > p.__kick ? c : p));
        const estEnd = new Date(latest.__kick.getTime() + 105*60000);
        const minsAfter = minutesBetween(estEnd, now);
        if (minsAfter >= 0 && minsAfter <= POST_MIN) return "live";
      }
      return "welcome";
    }

    async function fetchMatches(){
      const url = `/.netlify/functions/scores?comps=${encodeURIComponent(COMPS.join(","))}`;
      const res = await fetch(url, { cache:"no-store" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "Unknown API error");
      return data.matches || [];
    }

    function toRowItem(m){
      const sc = scoresFor(m);
      return {
        id: m.id,
        home: m.homeTeam?.name || "",
        away: m.awayTeam?.name || "",
        hs: (sc.home === null || sc.home === undefined) ? "" : sc.home,
        as: (sc.away === null || sc.away === undefined) ? "" : sc.away,
        st: statusLabel(m),
        nufc: !!m.__isNUFC,
        comp: String(m.comp || "").toUpperCase(),
      };
    }

    async function tick(){
      try{
        const now = londonNow();
        setDot('warn');
        if (DEBUG && dbgLastPollEl){
          dbgLastPollEl.textContent = new Intl.DateTimeFormat('en-GB',{
            timeZone:'Europe/London',hour:'2-digit',minute:'2-digit',second:'2-digit'
          }).format(now);
        }

        const matches = await fetchMatches();
        const sorted = pinAndSort(matches);
        const mode = decideMode(sorted, now);

        document.body.setAttribute("data-mode", mode);
        if (DEBUG && dbgModeEl) dbgModeEl.textContent = mode.toUpperCase();

        let display = sorted.filter(m => {
          const st = String(m.status || "").toUpperCase();

          if (isLiveStatus(st)) return true;

          if (st === "SCHEDULED" || st === "TIMED"){
            const mins = minutesBetween(now, m.__kick);
            return mins >= 0 && mins <= PRE_MIN;
          }

          if (st === "FINISHED"){
            const estEnd = new Date(m.__kick.getTime() + 105*60000);
            const minsAfter = minutesBetween(estEnd, now);
            return minsAfter >= 0 && minsAfter <= POST_MIN;
          }

          return false;
        });

        // If live mode but nothing matched, show next scheduled to avoid blank
        if (mode === "live" && display.length === 0){
          display = sorted
            .filter(m => {
              const st = String(m.status || "").toUpperCase();
              return st === "SCHEDULED" || st === "TIMED";
            })
            .slice(0, MAX_VISIBLE);
        }

        const rows = display.map(toRowItem);
        window.render(rows);

        const hasLive = display.some(m => isLiveStatus(m.status));
        const hasWarm = display.some(m => {
          const st = String(m.status || "").toUpperCase();
          if (st !== "SCHEDULED" && st !== "TIMED") return false;
          const mins = minutesBetween(now, m.__kick);
          return mins >= 0 && mins <= PRE_MIN;
        });

        const nextPoll = (() => {
          if (mode === "live" && hasLive) return 20_000;
          if (mode === "live" && hasWarm) return 60_000;
          if (mode === "live") return 90_000;
          return 300_000;
        })();

        setDot('good');
        if (DEBUG && dbgEveryEl) dbgEveryEl.textContent = `${((nextPoll/1000)|0)}s`;
        setDebug(`Mode=${mode.toUpperCase()} | rows=${rows.length} | next ${(nextPoll/1000)|0}s`);
        setTimeout(tick, nextPoll);

      }catch(e){
        setDot('bad');
        setDebug(`ERROR: ${e.message || e}`);
        setTimeout(tick, 60_000);
      }
    }

    setDot('clear');
    setTimeout(tick, 500);
  </script>
</body>
</html>
