<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Two Pennies URL Builder</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:800px;
  margin:40px auto;
  padding:20px;
}

h1{
  margin-bottom:30px;
}

.row{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
}

input[type="number"],
input[type="text"]{
  width:220px;
}

.url{
  width:100%;
  min-height:120px;
  font-family:monospace;
  padding:10px;
}

button{
  padding:10px 18px;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>Two Pennies Scoreboard URL Builder</h1>

<div class="row">
  <label>Competitions</label>

  <input type="checkbox" id="pl" checked> PL
  <input type="checkbox" id="cl" checked> CL
  <input type="checkbox" id="ec"> EC
  <input type="checkbox" id="wc"> WC
</div>

<div class="row">
  <label>Maximum Rows</label>
  <input id="max" type="number" value="5">
</div>

<div class="row">
  <label>Minutes Before Kick Off</label>
  <input id="pre" type="number" value="60">
</div>

<div class="row">
  <label>Minutes After Full Time</label>
  <input id="post" type="number" value="120">
</div>

<div class="row">

  <label>Highlights</label>

  <label>

    <input type="checkbox" id="nufc" checked>

    Newcastle

  </label>

  <label>

    <input type="checkbox" id="england">

    England

  </label>

  <label>

    <input type="checkbox" id="scotland">

    Scotland

  </label>

</div>

<div class="row">
  <label>Mode</label>

  <select id="mode">
    <option value="">AUTO</option>
    <option value="live">LIVE</option>
    <option value="welcome">WELCOME</option>
  </select>
</div>

<div class="row">
  <label>
    <input type="checkbox" id="debug">
    Debug
  </label>
</div>

<div class="row">
  <button onclick="copyUrl()">Copy URL</button>
</div>

<div class="row">
  <textarea id="url" class="url"></textarea>
</div>

<script>

function buildUrl(){

  const comps = [];

  if(document.getElementById('pl').checked) comps.push('PL');
  if(document.getElementById('cl').checked) comps.push('CL');
  if(document.getElementById('ec').checked) comps.push('EC');
  if(document.getElementById('wc').checked) comps.push('WC');
const max = document.getElementById('max').value;

const pre = document.getElementById('pre').value;

const post = document.getElementById('post').value;

const mode = document.getElementById('mode').value;

const debug = document.getElementById('debug').checked;

const highlights = [];

if(document.getElementById('nufc').checked) highlights.push('67');

if(document.getElementById('england').checked) highlights.push('770');

if(document.getElementById('scotland').checked) highlights.push('8873');

  const params = new URLSearchParams();

  params.set('comps', comps.join(','));
  params.set('max', max);
  params.set('pre', pre);
  params.set('post', post);
if(highlights.length){

  params.set('highlight', highlights.join(','));
  }

  if(mode){
    params.set('mode', mode);
  }

  if(debug){
    params.set('debug', '1');
  }

  const url =
    `${window.location.origin}/?${params.toString()}`;

  document.getElementById('url').value = url;
}

function copyUrl(){

  const txt = document.getElementById('url');

  txt.select();
  txt.setSelectionRange(0,99999);

  navigator.clipboard.writeText(txt.value);

  alert('URL copied');
}

document
  .querySelectorAll('input,select')
  .forEach(el=>{
    el.addEventListener('change',buildUrl);
    el.addEventListener('input',buildUrl);
  });

buildUrl();

</script>

</body>
</html>
